<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подготовка за ДЗИ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- 🔝 Navbar -->
<header class="navbar">
    <h2 class="logo">ДЗИ Prep</h2>
    <nav>
        <a href="index.html" class="logo">Начало</a>
        <a href="Subjects.html">Предмети</a>
        <a href="TEST.html">Тестове</a>
        <a href="Contacts.html">Контакти</a>
    </nav>
	<!-- 🌙 Dark mode бутон -->
    <button id="darkModeToggle">🌙</button>
</header>

<!-- 🎯 Hero -->
<section class="hero">
    <h1>Подготви се за матурите уверено!</h1>
    <p>Материали, тестове и ресурси на едно място</p>
	<input type="text" id="searchInput" placeholder="Търси предмет...">	
</section>

<!-- 📚 Предмети -->
<div class="container">

    <h2>Популярни предмети</h2>

    <div class="row">
        <div class="card bel" data-name="бел български език литература">		
            <img src="Images/img_1.jpg">
            <h3>БЕЛ</h3>
            <a href="BEL.html" class="btn">Виж</a>
			
        </div>

        <div class="card bio" data-name="биология здравно образование">		
            <img src="Images/img_2.jpg">
            <h3>Биология</h3>
            <a href="BIO.html" class="btn">Виж</a>
        </div>

        <div class="card inf" data-name="информатика">
            <img src="Images/img_3.jpg">
            <h3>Информатика</h3>
            <a href="INF.html" class="btn">Виж</a>
        </div>

        <div class="card it">
            <img src="Images/img_4.jpg" data-name="информационни технологии ит">
            <h3>ИТ</h3>
            <a href="IT.html" class="btn">Виж</a>
        </div>
    </div>
</div>

<!-- 📢 Банер -->
<section class="banner">
    Започни подготовката си още днес!
</section>

<!-- 🔚 Footer -->
<footer class="footer">
    <p>© 2026 ДЗИ Prep | Всички права запазени</p>
</footer>
<script>
const searchInput = document.getElementById("searchInput");
const cards = document.querySelectorAll(".card");
const noResults = document.getElementById("noResults");

searchInput.addEventListener("keyup", function() {
    const value = this.value.toLowerCase();
    let visible = 0;

    cards.forEach(card => {
        const name = card.getAttribute("data-name");

        if (name.includes(value)) {
            card.style.display = "block";
            visible++;
        } else {
            card.style.display = "none";
        }
    });

    noResults.style.display = visible === 0 ? "block" : "none";
});
const toggle = document.getElementById("darkModeToggle");

// Зареждане на запазена тема
if (localStorage.getItem("darkMode") === "on") {
    document.body.classList.add("dark");
}

// Клик
toggle.addEventListener("click", () => {
    document.body.classList.toggle("dark");
toggle.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
    // Запазване
    if (document.body.classList.contains("dark")) {
        localStorage.setItem("darkMode", "on");
    } else {
        localStorage.setItem("darkMode", "off");
    }
});
</script>
</body>
</html>
