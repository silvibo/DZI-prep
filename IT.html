<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИТ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="navbar">
    <h2>ДЗИ Prep</h2>
    <nav>
        <a href="index.html">Начало</a>
    </nav>
</header>

<section class="hero small">
    <h1>Информационни технологии</h1>
</section>

<div class="container">
    <h2>Уроци</h2>

    <div class="lessons">
        <div class="lesson">
            <h3>MS Word</h3>
            <button onclick="show('word')">Отвори</button>
        </div>

        <div class="lesson">
            <h3>Excel</h3>
            <button onclick="show('excel')">Отвори</button>
        </div>

        <div class="lesson">
            <h3>PowerPoint</h3>
            <button onclick="show('ppt')">Отвори</button>
        </div>
    </div>

    <div id="content"></div>
</div>

<footer class="footer">
    <p>© 2026 ДЗИ Prep</p>
</footer>

<script>
function show(type) {
    const c = document.getElementById("content");

    if(type === "word") {
        c.innerHTML = "<h2>MS Word</h2><p>Създаване на документи...</p>";
    }

    if(type === "excel") {
        c.innerHTML = "<h2>Excel</h2><p>Таблици и формули...</p>";
    }

    if(type === "ppt") {
        c.innerHTML = "<h2>PowerPoint</h2><p>Презентации...</p>";
    }
}
</script>

</body>
</html>
