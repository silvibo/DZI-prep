<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Информатика</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="navbar">
    <h2>ДЗИ Prep</h2>
    <nav>
        <a href="index.html">Начало</a>
    </nav>
</header>

<section class="hero small">
    <h1>Информатика</h1>
</section>

<div class="container">
    <h2>Уроци</h2>

    <div class="lessons">
        <div class="lesson">
            <h3>Алгоритми</h3>
            <button onclick="show('alg')">Отвори</button>
        </div>

        <div class="lesson">
            <h3>Масиви</h3>
            <button onclick="show('array')">Отвори</button>
        </div>

        <div class="lesson">
            <h3>Цикли</h3>
            <button onclick="show('loops')">Отвори</button>
        </div>
    </div>

    <div id="content"></div>
</div>

<footer class="footer">
    <p>© 2026 ДЗИ Prep</p>
</footer>

<script>
function show(type) {
    const c = document.getElementById("content");

    if(type === "alg") {
        c.innerHTML = "<h2>Алгоритми</h2><p>Стъпки за решаване на проблем...</p>";
    }

    if(type === "array") {
        c.innerHTML = "<h2>Масиви</h2><p>Съхраняване на множество стойности...</p>";
    }

    if(type === "loops") {
        c.innerHTML = "<h2>Цикли</h2><p>Повтарящи се действия...</p>";
    }
}
</script>

</body>
</html>
