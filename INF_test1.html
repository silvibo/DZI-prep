<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест по Информатика</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="navbar">
    <h2>ДЗИ Prep</h2>
    <nav>
        <a href="index.html">Начало</a>
        <a href="TEST.html">Назад</a>
    </nav>
</header>

<section class="hero small">
    <h1>Тест по Информатика (C#)</h1>
    <p>12 клас</p>
</section>

<div class="container">

    <form id="quizForm">

        <!-- Въпрос 1 -->
        <div class="question">
            <h3>1. Как се декларира цяло число в C#?</h3>
            <label><input type="radio" name="q1" value="0"> int x;</label><br>
            <label><input type="radio" name="q1" value="1"> string x;</label><br>
            <label><input type="radio" name="q1" value="2"> bool x;</label>
        </div>

        <!-- Въпрос 2 -->
        <div class="question">
            <h3>2. Как се извежда текст в конзолата?</h3>
            <label><input type="radio" name="q2" value="0"> Console.WriteLine()</label><br>
            <label><input type="radio" name="q2" value="1"> print()</label><br>
            <label><input type="radio" name="q2" value="2"> echo()</label>
        </div>

        <!-- Въпрос 3 -->
        <div class="question">
            <h3>3. Кой оператор е за сравнение?</h3>
            <label><input type="radio" name="q3" value="0"> ==</label><br>
            <label><input type="radio" name="q3" value="1"> =</label><br>
            <label><input type="radio" name="q3" value="2"> ++</label>
        </div>

        <!-- Въпрос 4 -->
        <div class="question">
            <h3>4. Какво прави цикълът for?</h3>
            <label><input type="radio" name="q4" value="0"> Повтаря код</label><br>
            <label><input type="radio" name="q4" value="1"> Спира програмата</label><br>
            <label><input type="radio" name="q4" value="2"> Чете вход</label>
        </div>

        <!-- Въпрос 5 -->
        <div class="question">
            <h3>5. Как се започва Main метод?</h3>
            <label><input type="radio" name="q5" value="0"> static void Main()</label><br>
            <label><input type="radio" name="q5" value="1"> void Start()</label><br>
            <label><input type="radio" name="q5" value="2"> main()</label>
        </div>

        <br>
        <button type="button" onclick="checkTest()" class="btn">Провери</button>

    </form>

    <h2 id="result"></h2>

</div>

<footer class="footer">
    <p>© 2026 ДЗИ Prep</p>
</footer>

<script>
function checkTest() {
    let score = 0;

    const answers = {
        q1: "0",
        q2: "0",
        q3: "0",
        q4: "0",
        q5: "0"
    };

    for (let q in answers) {
        const selected = document.querySelector(`input[name="${q}"]:checked`);
        if (selected && selected.value === answers[q]) {
            score++;
        }
    }

    const percent = (score / 5) * 100;
    document.getElementById("result").innerText = "Резултат: " + percent + "%";
}
</script>

</body>
</html>
