<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакти - ДЗИ Prep</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Navbar -->
<header class="navbar">
    <h2>ДЗИ Prep</h2>
    <nav>
        <a href="index.html">Начало</a>
        <a href="Subjects.html">Предмети</a>
        <a href="Tests.html">Тестове</a>
        <a href="Contacts.html">Контакти</a>
    </nav>
</header>

<!-- Hero -->
<section class="hero small">
    <h1>Свържете се с нас</h1>
    <p>Попълнете формата по-долу и ще се свържем с вас</p>
</section>

<!-- Контейнер -->
<div class="container">
    <form id="contactForm">

        <div class="question">
            <label for="name">Име:</label><br>
            <input type="text" id="name" name="name" required placeholder="Вашето име" style="width:100%;padding:10px;margin:5px 0;border-radius:5px;border:1px solid #ccc;">
        </div>

        <div class="question">
            <label for="email">Имейл:</label><br>
            <input type="email" id="email" name="email" required placeholder="example@mail.com" style="width:100%;padding:10px;margin:5px 0;border-radius:5px;border:1px solid #ccc;">
        </div>

        <div class="question">
            <label for="subject">Тема:</label><br>
            <input type="text" id="subject" name="subject" required placeholder="Тема на съобщението" style="width:100%;padding:10px;margin:5px 0;border-radius:5px;border:1px solid #ccc;">
        </div>

        <div class="question">
            <label for="message">Съобщение:</label><br>
            <textarea id="message" name="message" rows="5" required placeholder="Вашето съобщение..." style="width:100%;padding:10px;margin:5px 0;border-radius:5px;border:1px solid #ccc;"></textarea>
        </div>

        <button type="button" class="btn" onclick="submitForm()">Изпрати</button>
    </form>

    <h2 id="result"></h2>
</div>

<footer class="footer">
    <p>© 2026 ДЗИ Prep</p>
</footer>

<script>
function submitForm() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const subject = document.getElementById('subject').value.trim();
    const message = document.getElementById('message').value.trim();

    if (!name || !email || !subject || !message) {
        alert("Моля, попълнете всички полета.");
        return;
    }

    // Тук можем да добавим backend, но за сега просто показваме съобщение
    document.getElementById('result').innerText = `Благодарим, ${name}! Вашето съобщение е изпратено.`;
    
    // Изчистваме формата
    document.getElementById('contactForm').reset();
}
</script>

</body>
</html>
